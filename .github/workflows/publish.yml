# Publishes this n8n community node package to npm on every version tag push.
#
# Starting May 1 2026, n8n requires all community nodes submitted for
# verification to be published via GitHub Actions with npm provenance.
# This workflow satisfies that requirement.
#
# Preferred setup:
# - Configure npm Trusted Publishers for this repository and workflow.
# - Workflow filename must remain `publish.yml`.
#
# Alternative setup:
# - Create a granular npm access token and store it as `NPM_TOKEN` in GitHub
#   Actions secrets.

name: Publish to npm

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      publish:
        description: 'Publish to npm (requires Trusted Publisher or NPM_TOKEN)'
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version-file: '.nvmrc'
          cache: npm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Publish to npm (token)
        if: (startsWith(github.ref, 'refs/tags/v') || inputs.publish == true) && secrets.NPM_TOKEN != ''
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to npm (trusted publisher)
        if: (startsWith(github.ref, 'refs/tags/v') || inputs.publish == true) && secrets.NPM_TOKEN == ''
        run: npm publish --provenance --access public